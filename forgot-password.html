<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password | Kami's Gamified English Resources</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>

    <header class="site-header">
      <div class="container">
        <h1>Kami's Gamified English Resources</h1>
        <p>Interactive Kahoot and Wordwall activities for engaging English lessons.</p>
        <nav class="main-nav">
          <a href="/index.html">Home</a>
          <a href="/resources.html">Resources</a>
          <a href="/index.html#libraries">Libraries</a>
          <a href="/how-to-use.html">How to Use</a>
          <a href="/index.html#about">About</a>
        </nav>
      </div>
    </header>
    <main class="container">
      <section class="login-section">
        <h2>Forgot Password</h2>
        <p>Enter your account email and we will send you a secure reset link.</p>

        <form id="forgot-password-form">
          <label for="recovery-email">Email</label>
          <input
            type="email"
            id="recovery-email"
            name="email"
            autocomplete="email"
            required
          />

          <button type="submit">Send Reset Link</button>
          <p id="recovery-message" class="form-message" aria-live="polite"></p>
        </form>

        <p class="auth-switch"><a href="/login.html">Back to Sign In</a></p>
      </section>
    </main>

    <script type="module" src="/src/forgot-password.js"></script>
    <script type="module" src="/src/auth-nav.js"></script>
  </body>
</html>

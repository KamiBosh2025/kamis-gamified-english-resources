<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password | Kami's Gamified English Resources</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>

    <header class="site-header">
      <div class="container">
        <h1>Kami's Gamified English Resources</h1>
        <p>Interactive Kahoot and Wordwall activities for engaging English lessons.</p>
        <nav class="main-nav">
          <a href="/index.html">Home</a>
          <a href="/resources.html">Resources</a>
          <a href="/index.html#libraries">Libraries</a>
          <a href="/how-to-use.html">How to Use</a>
          <a href="/index.html#about">About</a>
        </nav>
      </div>
    </header>
    <main class="container">
      <section class="login-section">
        <h2>Reset Password</h2>
        <p>Choose a new password for your account.</p>

        <form id="reset-password-form">
          <label for="new-password">New Password</label>
          <input
            type="password"
            id="new-password"
            autocomplete="new-password"
            minlength="6"
            required
          />

          <label for="confirm-new-password">Confirm New Password</label>
          <input
            type="password"
            id="confirm-new-password"
            autocomplete="new-password"
            minlength="6"
            required
          />

          <button id="toggle-reset-passwords" type="button" aria-pressed="false">
            👁 Show passwords
          </button>

          <button type="submit">Save New Password</button>
          <p id="reset-message" class="form-message" aria-live="polite"></p>
        </form>

        <p class="auth-switch"><a href="/login.html">Back to Sign In</a></p>
      </section>
    </main>

    <script type="module" src="/src/reset-password.js"></script>
    <script type="module" src="/src/auth-nav.js"></script>
  </body>
</html>

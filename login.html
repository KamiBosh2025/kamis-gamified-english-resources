<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Kami's Gamified English Resources</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>

  <body>
    <header class="site-header">
      <div class="container">
        <h1>Kami's Gamified English Resources</h1>
        <p>Interactive Kahoot and Wordwall activities for engaging English lessons.</p>

        <nav class="main-nav">
          <a href="/index.html">Home</a>
          <a href="/resources.html">Resources</a>
          <a href="/index.html#libraries">Libraries</a>
          <a href="/how-to-use.html">How to Use</a>
          <a href="/index.html#about">About</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <section class="login-section">
        <h2>Sign In</h2>
        <p>Sign in to access your account.</p>

        <form id="login-form">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            autocomplete="email"
            required
          />

          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            autocomplete="current-password"
            required
          />

          <button type="submit">Sign In</button>
          <p id="login-message"></p>
        </form>
      </section>
    </main>

    <script type="module" src="/src/login.js"></script>
  </body>
</html>
